# Velociraptor VQL Artifact — Ransomware Indicator Collector
#
# Collects forensic artifacts relevant to ransomware incidents:
#   - Ransom notes (by common filenames)
#   - Suspicious file hashes
#   - Persistence mechanisms (scheduled tasks, registry run keys)
#   - Process trees
#   - Network connections
#
# Deploy via Velociraptor server → Collected Artifacts → Add Artifact
# Then hunt across endpoints with: Hunt → New Hunt → Select this artifact

name: Custom.Ransomware.IndicatorCollector
description: |
  Collects ransomware-related forensic artifacts from endpoints for
  analysis by the Ransomware Intelligence Agent.

  Artifacts collected:
  - Ransom notes (README, DECRYPT, RESTORE files)
  - File hashes from common ransomware drop locations
  - Scheduled tasks (persistence)
  - Registry Run keys (persistence)
  - Active network connections
  - Running processes with hashes

type: CLIENT

parameters:
  - name: RansomNotePatterns
    description: Glob patterns for ransom note files
    type: csv
    default: |
      Pattern
      C:\**\README*.txt
      C:\**\DECRYPT*.txt
      C:\**\RESTORE*.txt
      C:\**\HOW_TO*.txt
      C:\**\RECOVER*.txt
      C:\**\!*.txt
      C:\**\*LOCKED*.txt
      C:\**\*ENCRYPTED*.txt

  - name: SuspiciousDirectories
    description: Directories to hash for suspicious binaries
    type: csv
    default: |
      Directory
      C:\ProgramData\
      C:\Windows\Temp\
      C:\Users\Public\

  - name: CollectProcessTree
    description: Include running process tree
    type: bool
    default: "Y"

  - name: CollectNetworkConnections
    description: Include active network connections
    type: bool
    default: "Y"

sources:
  - name: RansomNotes
    description: Find and collect ransom note files
    query: |
      -- Search for ransom notes by common filenames
      LET note_patterns = SELECT Pattern FROM parse_csv(
        filename=RansomNotePatterns, accessor="data")

      SELECT
        FullPath,
        Name,
        Size,
        Mtime,
        read_file(filename=FullPath, length=10000) AS Content,
        hash(path=FullPath) AS Hash
      FROM foreach(
        row=note_patterns,
        query={
          SELECT FullPath, Name, Size, Mtime
          FROM glob(globs=Pattern)
          WHERE NOT IsDir
            AND Size < 1000000
            AND Size > 10
        })

  - name: SuspiciousHashes
    description: Hash files in common ransomware drop locations
    query: |
      LET directories = SELECT Directory FROM parse_csv(
        filename=SuspiciousDirectories, accessor="data")

      SELECT
        FullPath,
        Name,
        Size,
        Mtime,
        hash(path=FullPath) AS Hash
      FROM foreach(
        row=directories,
        query={
          SELECT FullPath, Name, Size, Mtime
          FROM glob(globs=Directory + "*.exe")
          WHERE NOT IsDir
            AND Size > 1000
        })

  - name: ScheduledTasks
    description: Enumerate scheduled tasks for persistence detection
    query: |
      SELECT
        Name,
        Path,
        Enabled,
        LastRunTime,
        NextRunTime,
        Actions
      FROM Artifact.Windows.System.TaskScheduler()
      WHERE Enabled = true

  - name: RegistryRunKeys
    description: Check registry Run keys for persistence
    query: |
      LET run_keys = (
        "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run\\*",
        "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnce\\*",
        "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run\\*",
        "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\RunOnce\\*"
      )

      SELECT
        Key.FullPath AS RegistryPath,
        Key.Name AS Name,
        Key.Data.value AS Value,
        Key.Mtime AS Modified
      FROM foreach(
        row=run_keys,
        query={
          SELECT * FROM glob(globs=_, accessor="registry")
        })

  - name: NetworkConnections
    description: Active network connections
    query: |
      SELECT
        Pid,
        Name,
        FamilyString AS Family,
        TypeString AS Type,
        Status,
        Laddr.IP AS LocalIP,
        Laddr.Port AS LocalPort,
        Raddr.IP AS RemoteIP,
        Raddr.Port AS RemotePort
      FROM connections()
      WHERE Status = "ESTABLISHED"
        OR Status = "LISTEN"

  - name: ProcessTree
    description: Running process tree with hashes
    query: |
      SELECT
        Pid,
        Ppid,
        Name,
        Exe,
        CommandLine,
        Username,
        CreateTime,
        hash(path=Exe) AS ExeHash
      FROM pslist()
      WHERE Pid > 4
