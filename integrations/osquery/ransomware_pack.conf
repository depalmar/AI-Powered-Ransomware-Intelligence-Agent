{
  "queries": {
    "ransomware_scheduled_tasks": {
      "query": "SELECT name, action, path, enabled, last_run_time, next_run_time FROM scheduled_tasks WHERE enabled = 1 AND (action LIKE '%ProgramData%' OR action LIKE '%Temp%' OR action LIKE '%AppData%' OR action LIKE '%Public%');",
      "interval": 300,
      "description": "Suspicious scheduled tasks (common ransomware persistence)",
      "platform": "windows"
    },
    "ransomware_registry_run_keys": {
      "query": "SELECT key, name, path, data, mtime FROM registry WHERE key LIKE 'HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run%' OR key LIKE 'HKEY_CURRENT_USER\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run%';",
      "interval": 300,
      "description": "Registry Run keys (persistence indicators)",
      "platform": "windows"
    },
    "suspicious_network_connections": {
      "query": "SELECT p.name, p.path, p.cmdline, pn.remote_address, pn.remote_port, pn.local_port, pn.protocol FROM process_open_sockets pn JOIN processes p ON pn.pid = p.pid WHERE pn.remote_address != '' AND pn.remote_address != '127.0.0.1' AND pn.remote_address != '::1' AND pn.remote_port != 0 AND p.path NOT LIKE '%\\Windows\\System32%' AND p.path NOT LIKE '%\\Program Files%';",
      "interval": 60,
      "description": "Outbound connections from non-standard paths",
      "platform": "windows"
    },
    "suspicious_executables": {
      "query": "SELECT path, filename, size, sha256 FROM hash JOIN file ON hash.path = file.path WHERE file.directory IN ('C:\\ProgramData', 'C:\\Windows\\Temp', 'C:\\Users\\Public') AND file.filename LIKE '%.exe';",
      "interval": 600,
      "description": "Executables in suspicious directories with hashes",
      "platform": "windows"
    },
    "ransomware_file_extensions": {
      "query": "SELECT path, filename, size, mtime FROM file WHERE directory = 'C:\\Users' AND (filename LIKE '%.encrypted' OR filename LIKE '%.locked' OR filename LIKE '%.lockbit' OR filename LIKE '%.basta' OR filename LIKE '%.akira' OR filename LIKE '%.play' OR filename LIKE '%.rhysida') LIMIT 100;",
      "interval": 300,
      "description": "Files with known ransomware extensions",
      "platform": "windows"
    },
    "shadow_copy_status": {
      "query": "SELECT * FROM windows_optional_features WHERE name = 'VSSService';",
      "interval": 600,
      "description": "Volume Shadow Copy service status",
      "platform": "windows"
    },
    "loaded_modules_suspicious": {
      "query": "SELECT p.name AS process_name, p.path AS process_path, pm.path AS module_path, pm.size FROM process_memory_map pm JOIN processes p ON pm.pid = p.pid WHERE pm.path LIKE '%Temp%' OR pm.path LIKE '%ProgramData%' LIMIT 100;",
      "interval": 600,
      "description": "Modules loaded from suspicious paths",
      "platform": "windows"
    },
    "recently_created_services": {
      "query": "SELECT name, display_name, path, start_type, status, description FROM services WHERE path LIKE '%ProgramData%' OR path LIKE '%Temp%' OR path LIKE '%AppData%';",
      "interval": 300,
      "description": "Services running from suspicious paths",
      "platform": "windows"
    }
  }
}
